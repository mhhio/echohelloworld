name: Echo Hello World

on:
  # schedule:
  #   - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append hello world to output.log
        run: echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') - Hello World" >> output.log

      - name: Commit and push output.log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.log
          git commit -m "chore: append hello world [$(date -u '+%Y-%m-%d %H:%M')]"
          git push
